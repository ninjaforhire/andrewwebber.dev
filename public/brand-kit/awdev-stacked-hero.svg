<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Andrew Webber.dev stacked hero mark</title>
  <desc id="desc">Website-style stacked hero mark with .dev kicked out to the right middle of the name stack.</desc>
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8b8c4"/>
      <stop offset="24%" stop-color="#ffffff"/>
      <stop offset="52%" stop-color="#d8d8e0"/>
      <stop offset="100%" stop-color="#6c6c78"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aaffc0"/>
      <stop offset="18%" stop-color="#00ff5c"/>
      <stop offset="64%" stop-color="#00d83a"/>
      <stop offset="100%" stop-color="#006e1d"/>
    </linearGradient>
    <pattern id="scan" width="1" height="5" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="#06130a" opacity="0.24"/>
    </pattern>
  </defs>
  <rect width="920" height="520" fill="none"/>
  <g font-family="Inter, Geist, Arial Black, Arial, sans-serif" font-weight="900" letter-spacing="-15">
    <text x="34" y="205" font-size="190" fill="url(#steel)">Andrew</text>
    <text x="34" y="372" font-size="190" fill="url(#green)">Webber</text>
    <text x="34" y="372" font-size="190" fill="url(#scan)" opacity="0.58">Webber</text>
  </g>
  <g font-family="Geist Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="600">
    <text x="735" y="282" font-size="52" fill="#8f909a">.dev</text>
    <rect x="884" y="267" width="34" height="6" fill="#00ff41"/>
  </g>
</svg>
