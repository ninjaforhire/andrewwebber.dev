<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">Andrew Webber.dev main wordmark</title>
  <desc id="desc">Stacked Andrew Webber wordmark with .dev positioned to the right middle of the name stack.</desc>
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8b8c4"/>
      <stop offset="24%" stop-color="#ffffff"/>
      <stop offset="52%" stop-color="#d8d8e0"/>
      <stop offset="100%" stop-color="#6c6c78"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aaffc0"/>
      <stop offset="18%" stop-color="#00ff5c"/>
      <stop offset="64%" stop-color="#00d83a"/>
      <stop offset="100%" stop-color="#006e1d"/>
    </linearGradient>
    <pattern id="scan" width="1" height="6" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="#06130a" opacity="0.26"/>
    </pattern>
  </defs>
  <rect width="1280" height="360" fill="none"/>
  <g font-family="Inter, Geist, Arial Black, Arial, sans-serif" font-weight="900" letter-spacing="-18">
    <text x="34" y="146" font-size="164" fill="url(#steel)">Andrew</text>
    <text x="34" y="298" font-size="164" fill="url(#green)">Webber</text>
    <text x="34" y="298" font-size="164" fill="url(#scan)" opacity="0.58">Webber</text>
  </g>
  <g font-family="Geist Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="600">
    <text x="980" y="208" font-size="58" fill="#8f909a">.dev</text>
    <rect x="1146" y="191" width="38" height="7" fill="#00ff41"/>
  </g>
</svg>
