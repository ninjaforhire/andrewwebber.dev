<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 260" role="img" aria-labelledby="title desc">
  <title id="title">Andrew Webber.dev horizontal logo</title>
  <desc id="desc">Horizontal Andrew Webber.dev logo for narrow headers and presentation footers.</desc>
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8b8c4"/>
      <stop offset="24%" stop-color="#ffffff"/>
      <stop offset="52%" stop-color="#d8d8e0"/>
      <stop offset="100%" stop-color="#6c6c78"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aaffc0"/>
      <stop offset="18%" stop-color="#00ff5c"/>
      <stop offset="64%" stop-color="#00d83a"/>
      <stop offset="100%" stop-color="#006e1d"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="260" fill="none"/>
  <g font-family="Inter, Geist, Arial Black, Arial, sans-serif" font-weight="900" letter-spacing="-12">
    <text x="34" y="172" font-size="156" fill="url(#steel)">Andrew</text>
    <text x="640" y="172" font-size="156" fill="url(#green)">Webber</text>
  </g>
  <g font-family="Geist Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="600">
    <text x="1260" y="154" font-size="48" fill="#8f909a">.dev</text>
    <rect x="1398" y="140" width="32" height="6" fill="#00ff41"/>
  </g>
</svg>
